name: FuzzyXAI readiness

on:
  push:
    branches:
      - main
      - audit/fuzzyxai-final-readiness
  pull_request:

jobs:
  readiness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Run doctoral release check
        run: |
          make doctorate-release-check
