hybrid_xiris:
  dataset_id: hybrid_xiris_control
  scenario_id: hybrid_xiris
  artifact_type: iris_image
  status: control_demo_artifact
  source: local_control_artifact
  license: internal_demo
  raw_path: data/raw/iris/
  processed_path: data/processed/iris/
  required_files:
    - input_hybrid_xiris_eye_sample.json
  required_fields:
    - image_quality
    - segmentation_quality
    - model_match_signal
    - alpha_accept
    - alpha_block
  evidence_level: full_control_run
  control_demo_artifact: true
  not_industrial_biometric_validation: true
  not_a_claim: Not an industrial biometric validation.

